<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Memory Lane | Perekond Ojaküla</title>
    <meta name="description" content="Professionaalne mälumäng 20 tasemega. Arenda mälu mängides! Perekond Ojaküla">
    <meta name="author" content="Perekond Ojaküla">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
        body{min-height:100vh;background:#0a0a2a;font-family:'Segoe UI',Arial,sans-serif;display:flex;justify-content:center;align-items:center;padding:10px;touch-action:pan-y}
        .stars-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:radial-gradient(ellipse at bottom,#1b2735 0%,#090a0f 100%);overflow:hidden}
        .stars{position:absolute;width:100%;height:100%;animation:starMove 200s linear infinite}
        .stars::before,.stars::after{content:"";position:absolute;width:100%;height:100%;background-image:radial-gradient(2px 2px at 20px 30px,#fff,transparent),radial-gradient(1px 1px at 90px 40px,#fff,transparent),radial-gradient(2px 2px at 160px 120px,#fff,transparent),radial-gradient(1px 1px at 230px 80px,#ffd,transparent),radial-gradient(3px 3px at 500px 200px,#fff,transparent);background-repeat:repeat;background-size:250px 250px;opacity:0.8}
        .stars::after{background-size:400px 400px;opacity:0.5;animation:twinkle 4s infinite alternate}
        @keyframes starMove{from{transform:translateY(0)}to{transform:translateY(-2000px)}}
        @keyframes twinkle{0%{opacity:0.3}100%{opacity:0.7}}
        .game-container{position:relative;z-index:10;max-width:800px;width:100%;margin:0 auto}
        .menu-screen,.game-screen,.level-select,.win-screen{background:rgba(20,30,50,0.85);backdrop-filter:blur(10px);border-radius:30px;padding:25px 20px;box-shadow:0 20px 50px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);color:#fff}
        .screen-title{text-align:center;font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px #6eb5ff}
        .hidden{display:none!important}
        .difficulty-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-bottom:25px}
        .difficulty-btn{background:linear-gradient(145deg,#2a3a55,#1a2a45);border:2px solid #4a7ab5;color:#fff;padding:18px 10px;border-radius:20px;font-size:1.2em;font-weight:700;cursor:pointer;box-shadow:0 8px 0 #0f1a2a;text-align:center}
        .difficulty-btn:active{transform:translateY(4px);box-shadow:0 4px 0 #0f1a2a}
        .difficulty-btn small{display:block;font-size:0.75em;opacity:0.8}
        .theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:20px 0}
        .theme-btn{background:linear-gradient(145deg,#34495e,#2c3e50);border:2px solid #5dade2;color:#fff;padding:15px;border-radius:18px;font-size:1.1em;cursor:pointer;box-shadow:0 5px 0 #1a252f}
        .theme-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #1a252f}
        .theme-btn.locked{opacity:0.5;filter:grayscale(0.7);pointer-events:none}
        .stars-earned{display:flex;justify-content:center;gap:5px;margin-top:8px}
        .star-icon{color:#ffd700;font-size:1.2em}
        .star-icon.empty{color:#555}
        .game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
        .game-stats{display:flex;gap:20px;font-size:1.3em;background:rgba(0,0,0,0.2);padding:8px 20px;border-radius:50px}
        .hint-btn{background:linear-gradient(145deg,#e67e22,#d35400);border:none;color:#fff;padding:10px 20px;border-radius:50px;font-size:1.2em;cursor:pointer;box-shadow:0 5px 0 #a04000}
        .hint-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #a04000}
        .hint-btn.disabled{opacity:0.5;pointer-events:none}
        .back-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:10px 18px;border-radius:50px;cursor:pointer}
        .cards-grid{display:grid;gap:10px;justify-content:center;margin:20px 0}
        .card{aspect-ratio:1/1;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform 0.5s;border-radius:15px}
        .card.flipped{transform:rotateY(180deg)}
        .card.matched{pointer-events:none;opacity:0.7}
        .card.shake{animation:shake 0.4s}
        .card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:2.5em;box-shadow:0 8px 0 rgba(0,0,0,0.2)}
        .card-front{background:linear-gradient(145deg,#fff,#f0f0f0);transform:rotateY(180deg);border:3px solid #ffd700}
        .card-back{background:linear-gradient(145deg,#3498db,#2980b9);border:3px solid #5dade2}
        .card-back::after{content:"?";color:rgba(255,255,255,0.5);font-size:2em}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
        .btn{background:linear-gradient(145deg,#2ecc71,#27ae60);border:none;color:#fff;padding:15px 30px;border-radius:50px;font-size:1.2em;cursor:pointer;box-shadow:0 6px 0 #1e8449}
        .btn:active{transform:translateY(3px);box-shadow:0 3px 0 #1e8449}
        .btn-secondary{background:linear-gradient(145deg,#95a5a6,#7f8c8d);box-shadow:0 6px 0 #5d6d7e}
        .action-buttons{display:flex;gap:10px;justify-content:center;margin-top:20px}
        .win-screen{text-align:center;padding:40px 30px}
        .trophy{font-size:5em;margin:20px 0;animation:bounce 1s infinite alternate}
        @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-20px)}}
        .author-credit{margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,215,0,0.3);font-size:1.1em;color:#ffd700;text-align:center;font-style:italic}
        #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}
        @media (max-width:600px){
            .screen-title{font-size:2em}
            .difficulty-btn{padding:12px 5px;font-size:1em}
            .card-front,.card-back{font-size:1.8em}
            .game-stats{font-size:1.1em;padding:6px 12px}
        }
        @media (max-width:400px){
            .cards-grid{gap:6px}
            .card-front,.card-back{font-size:1.3em}
        }
    </style>
</head>
<body>
    <div class="stars-bg"><div class="stars"></div></div>
    <canvas id="confetti-canvas"></canvas>

    <div class="game-container">
        <!-- PEAMENÜÜ -->
        <div id="menuScreen" class="menu-screen">
            <h1 class="screen-title">🎮 MEMORY LANE</h1>
            <p class="subtitle" id="greetingMessage">Alustame seiklust!</p>
            <div class="difficulty-grid">
                <div class="difficulty-btn" data-diff="easy">🌱 KERGE<br><small>3x4 (6 paari)</small></div>
                <div class="difficulty-btn" data-diff="medium">🌿 KESKMINE<br><small>4x4 (8 paari)</small></div>
                <div class="difficulty-btn" data-diff="hard">🔥 RASKE<br><small>4x5 (10 paari)</small></div>
                <div class="difficulty-btn" data-diff="expert">⭐ EKSPERT<br><small>5x6 (15 paari)</small></div>
            </div>
            <div class="author-credit" id="menuAuthor"></div>
        </div>

        <!-- TASEME VALIK -->
        <div id="levelSelect" class="level-select hidden">
            <h2 class="screen-title" id="difficultyTitle">Vali teema</h2>
            <div id="themeGrid" class="theme-grid"></div>
            <div class="action-buttons">
                <button class="btn btn-secondary" id="backToMenuBtn">← Tagasi</button>
            </div>
            <div class="author-credit" id="levelAuthor"></div>
        </div>

        <!-- MÄNGU EKRAAN -->
        <div id="gameScreen" class="game-screen hidden">
            <div class="game-header">
                <button class="back-btn" id="gameBackBtn">← Menüü</button>
                <div class="game-stats">
                    <span>⭐ <span id="starDisplay">3</span></span>
                    <span>🔄 <span id="movesDisplay">0</span></span>
                </div>
                <button class="hint-btn" id="hintBtn">💡 <span id="hintsLeft">3</span></button>
            </div>
            <div id="cardsContainer" class="cards-grid"></div>
            <div class="author-credit" id="gameAuthor"></div>
        </div>

        <!-- VÕIDU EKRAAN -->
        <div id="winScreen" class="win-screen hidden">
            <h2 class="screen-title">🏆 VÕIT!</h2>
            <div class="trophy">🏆</div>
            <p style="font-size:1.3em;margin:20px 0" id="congratsMessage">Palju õnne! Kõik 5 taset läbitud!</p>
            <div id="finalStars" style="font-size:2em;margin:20px 0"></div>
            <button class="btn" id="playAgainBtn">Mängi uuesti</button>
            <div class="author-credit" id="winAuthor"></div>
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            // ==================== AUTORI RANDOM LAUSED ====================
            const authorMessages = [
                "❤️ Armastusega loodud - Perekond Ojaküla ❤️",
                "🎮 Mängurõõmu ja naeratusi soovides - Perekond Ojaküla 🎮",
                "✨ Mälestusi luues ja hetki jagades - Perekond Ojaküla ✨",
                "👨‍👩‍👧‍👦 Üheskoos mängides on rõõm kahekordne - Perekond Ojaküla 👨‍👩‍👧‍👦",
                "💫 Südamega Eestist - Perekond Ojaküla 💫",
                "🌟 Iga kaardi taga on väike killuke rõõmu - Perekond Ojaküla 🌟",
                "🎯 Mängi, naudi, naerata! - Perekond Ojaküla 🎯",
                "🏡 Kodusest köögist teie ekraanile - Perekond Ojaküla 🏡",
                "🌙 Unistuste ja mängude öö - Perekond Ojaküla 🌙",
                "⭐ Tähtedest kirjutatud lugu - Perekond Ojaküla ⭐"
            ];

            const greetings = [
                "Alustame seiklust!", "Õnn kaasa!", "Leia kõik paarid!", 
                "Ole tähelepanelik!", "Head mängu!", "Naudi mängimist!"
            ];

            const congrats = [
                "Suurepärane!", "Sa oled meister!", "Fantastiline tulemus!", 
                "Väga hea mälu!", "Oled võitja!", "Imeline!"
            ];

            // ==================== MÄNGU SEADED ====================
            const DIFFICULTIES = {
                easy: { rows: 3, cols: 4, name: 'KERGE' },
                medium: { rows: 4, cols: 4, name: 'KESKMINE' },
                hard: { rows: 4, cols: 5, name: 'RASKE' },
                expert: { rows: 5, cols: 6, name: 'EKSPERT' }
            };

            const THEMES = ['Loomad', 'Puuviljad', 'Loodus', 'Meri', 'Maagia', 'Toit', 'Sport', 'Kosmos', 'Ookean', 'Linnud', 'Sõidukid', 'Muusika'];
            
            const THEME_ICONS = {
                'Loomad': ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐸','🐵','🐔','🐧'],
                'Puuviljad': ['🍎','🍐','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍒','🍑','🥭','🍍','🥥','🥝','🍅'],
                'Loodus': ['🌲','🌳','🌴','🌵','🌾','🌿','🍀','🍁','🍂','🌺','🌻','🌼','🌸','💐','🌹','☀️'],
                'Meri': ['🐟','🐠','🐡','🦐','🦑','🐙','🦀','🐬','🐳','🐋','🦈','🐚','🧜','⚓','🌊'],
                'Maagia': ['✨','🔮','⚡','🌟','💫','⭐','🌙','☄️','🪄','🧙','🧚','🦄','🐉','🎆','💎'],
                'Toit': ['🍕','🍔','🌭','🍿','🥨','🍦','🍩','🍪','🎂','🍫','🍬','🥗','🌮','🥙','🍣','☕'],
                'Sport': ['⚽','🏀','🏈','⚾','🥎','🎾','🏐','🏉','🥏','🎱','🏓','🏸','🏒','🏑','🥍','🏹'],
                'Kosmos': ['🌍','🌎','🌏','🌕','🌖','🌗','🌘','🌑','🌒','🌓','🌔','☀️','⭐','🌟','☄️','🚀'],
                'Ookean': ['🐠','🐟','🐡','🐙','🪸','🐋','🦈','🦭','🐚','🌊','🏝️','⛵','🛶','🧜‍♀️','🐬','🪼'],
                'Linnud': ['🦅','🦆','🦉','🐦','🐧','🐔','🐓','🦃','🕊️','🦜','🦚','🦢','🐤','🐣'],
                'Sõidukid': ['🚗','🚕','🚙','🚌','🚎','🏎️','🚓','🚑','🚒','🚐','🛻','🚚','🚛','🚜','🏍️','✈️'],
                'Muusika': ['🎵','🎶','🎷','🎸','🎹','🎺','🎻','🪕','🥁','🎤','🎧','📻','🎼','🎬','🎭','🎨']
            };

            // ==================== HELI ====================
            let audioCtx = null;
            function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            function playSound(type) {
                if (!audioCtx) initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if(type === 'match') { osc.frequency.value = 880; gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2); osc.start(); osc.stop(now + 0.2); }
                else if(type === 'wrong') { osc.frequency.value = 220; gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3); osc.start(); osc.stop(now + 0.3); }
                else if(type === 'flip') { osc.frequency.value = 660; gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1); osc.start(); osc.stop(now + 0.1); }
                else if(type === 'hint') { osc.frequency.value = 1046; gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15); osc.start(); osc.stop(now + 0.15); }
            }

            // ==================== KONFETI ====================
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [], animFrame = null;
            function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resizeCanvas); resizeCanvas();
            function createConfetti(x, y, count = 30) {
                const colors = ['#ff6b6b','#4ecdc4','#ffe66d','#a8e6cf','#ff8b94','#b5e7a0','#9b59b6','#3498db','#e74c3c'];
                for(let i=0;i<count;i++) particles.push({x:x||canvas.width/2,y:y||canvas.height/3,size:Math.random()*8+4,color:colors[Math.floor(Math.random()*colors.length)],vx:(Math.random()-0.5)*8,vy:Math.random()*-5-2,gravity:0.15,rotation:Math.random()*360,rotSpeed:(Math.random()-0.5)*10,alpha:1,fade:0.005+Math.random()*0.01});
                if(!animFrame) animateConfetti();
            }
            function animateConfetti() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                let has = false;
                for(let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.rotation+=p.rotSpeed;p.alpha-=p.fade;if(p.alpha<=0||p.y>canvas.height+50){particles.splice(i,1);continue}has=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rotation*Math.PI/180);ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore()}
                has?animFrame=requestAnimationFrame(animateConfetti):animFrame=null;
            }

            // ==================== MÄNGU OLEK ====================
            let gameState = {
                currentDifficulty: null, currentLevel: 1, cards: [], flippedIndices: [],
                matchedPairs: 0, moves: 0, hintsLeft: 3, gameLocked: false
            };
            let savedProgress = { easy:[0,0,0,0,0], medium:[0,0,0,0,0], hard:[0,0,0,0,0], expert:[0,0,0,0,0] };

            function loadProgress() { try { let s = localStorage.getItem('memoryLane'); if(s) savedProgress = JSON.parse(s); } catch(e){} }
            function saveProgress() { try { localStorage.setItem('memoryLane', JSON.stringify(savedProgress)); } catch(e){} }
            function getStars(diff, idx) { return savedProgress[diff][idx] || 0; }
            function setStars(diff, idx, stars) { if(stars > savedProgress[diff][idx]) { savedProgress[diff][idx] = stars; saveProgress(); } }

            // ==================== UI ELEMENDID ====================
            const menu = document.getElementById('menuScreen'), levelSel = document.getElementById('levelSelect');
            const gameScr = document.getElementById('gameScreen'), winScr = document.getElementById('winScreen');
            const diffTitle = document.getElementById('difficultyTitle'), themeGrid = document.getElementById('themeGrid');
            const cardsCont = document.getElementById('cardsContainer'), movesDisp = document.getElementById('movesDisplay');
            const starDisp = document.getElementById('starDisplay'), hintsSpan = document.getElementById('hintsLeft');
            const hintBtn = document.getElementById('hintBtn');

            // ==================== ABIFUNKTSIOONID ====================
            function shuffle(arr) { for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
            function calcStars(moves, pairs) { let min = pairs; if(moves <= min*1.2) return 3; if(moves <= min*1.8) return 2; return 1; }

            function initGame(diff, theme) {
                let d = DIFFICULTIES[diff], total = d.rows * d.cols, pairs = total/2;
                let icons = THEME_ICONS[theme] || ['🎴','🃏'];
                let vals = shuffle([...icons.slice(0,pairs), ...icons.slice(0,pairs)]);
                gameState.cards = vals.map((v,i)=>({id:i,value:v,matched:false,flipped:false}));
                gameState.flippedIndices=[]; gameState.matchedPairs=0; gameState.moves=0; gameState.hintsLeft=3; gameState.gameLocked=false;
                updateStats(); renderCards();
            }

            function renderCards() {
                let d = DIFFICULTIES[gameState.currentDifficulty];
                cardsCont.style.gridTemplateColumns = `repeat(${d.cols}, 1fr)`;
                let h = ''; gameState.cards.forEach((c,i)=>{ let f=c.flipped?'flipped':'', m=c.matched?'matched':''; h+=`<div class="card ${f} ${m}" data-index="${i}"><div class="card-front">${c.value}</div><div class="card-back"></div></div>`; });
                cardsCont.innerHTML = h;
            }

            function updateStats() {
                movesDisp.textContent = gameState.moves;
                starDisp.textContent = calcStars(gameState.moves, gameState.cards.length/2);
                hintsSpan.textContent = gameState.hintsLeft;
                hintBtn.classList.toggle('disabled', gameState.hintsLeft <= 0);
            }

            function flipCard(idx) {
                let c = gameState.cards[idx];
                if(gameState.gameLocked || c.matched || c.flipped || gameState.flippedIndices.length>=2) return false;
                c.flipped=true; gameState.flippedIndices.push(idx); playSound('flip'); renderCards();
                if(gameState.flippedIndices.length===2) { gameState.moves++; updateStats(); checkMatch(); }
                return true;
            }

            function checkMatch() {
                gameState.gameLocked = true;
                cardsCont.style.pointerEvents = 'none'; // PARANDUS: blokeeri klikid
                let [i1,i2] = gameState.flippedIndices, c1=gameState.cards[i1], c2=gameState.cards[i2];
                if(c1.value === c2.value) {
                    c1.matched=c2.matched=true; gameState.matchedPairs++; gameState.flippedIndices=[]; gameState.gameLocked=false;
                    cardsCont.style.pointerEvents = ''; // Taasta klikid
                    playSound('match'); createConfetti(canvas.width/2, canvas.height/3, 15); renderCards();
                    if(gameState.matchedPairs === gameState.cards.length/2) levelComplete();
                } else {
                    playSound('wrong');
                    let cards = document.querySelectorAll('.card');
                    cards[i1].classList.add('shake'); cards[i2].classList.add('shake');
                    setTimeout(() => {
                        c1.flipped=c2.flipped=false; gameState.flippedIndices=[]; gameState.gameLocked=false;
                        cards[i1].classList.remove('shake'); cards[i2].classList.remove('shake');
                        renderCards();
                        cardsCont.style.pointerEvents = ''; // Taasta klikid
                    }, 600);
                }
            }

            function levelComplete() {
                let diff = gameState.currentDifficulty, lvl = gameState.currentLevel-1;
                let stars = calcStars(gameState.moves, gameState.cards.length/2);
                setStars(diff, lvl, stars);
                createConfetti(canvas.width/2, canvas.height/3, 80);
                setTimeout(() => {
                    if(gameState.currentLevel === 5) showWin();
                    else { gameState.currentLevel++; showLevelSelect(diff); }
                }, 2000);
            }

            function showHint() {
                if(gameState.hintsLeft<=0 || gameState.gameLocked) return;
                let unmatched = gameState.cards.filter(c=>!c.matched), pairs={};
                unmatched.forEach(c=>{ if(!pairs[c.value]) pairs[c.value]=[]; pairs[c.value].push(c); });
                for(let v in pairs) {
                    if(pairs[v].length>=2) {
                        let c1=pairs[v][0], c2=pairs[v][1];
                        if(!c1.flipped && !c2.flipped) {
                            c1.flipped=c2.flipped=true; gameState.hintsLeft--; playSound('hint');
                            renderCards(); updateStats();
                            setTimeout(()=>{ c1.flipped=c2.flipped=false; renderCards(); }, 800);
                            return;
                        }
                    }
                }
            }

            function showLevelSelect(diff) {
                gameState.currentDifficulty = diff;
                menu.classList.add('hidden'); gameScr.classList.add('hidden'); winScr.classList.add('hidden'); levelSel.classList.remove('hidden');
                diffTitle.textContent = DIFFICULTIES[diff].name + ' - Vali teema';
                let h = '';
                for(let i=0;i<5;i++) {
                    let t = THEMES[i], s = getStars(diff, i), locked = i>0 && getStars(diff,i-1)===0;
                    let starsH = '<div class="stars-earned">';
                    for(let j=0;j<3;j++) starsH += `<span class="star-icon ${j<s?'':'empty'}">${j<s?'★':'☆'}</span>`;
                    starsH += '</div>';
                    h += `<div class="theme-btn ${locked?'locked':''}" data-theme="${t}" data-level="${i+1}">${t}${starsH}</div>`;
                }
                themeGrid.innerHTML = h;
                updateAuthorMessages();
            }

            function startLevel(diff, theme, lvl) {
                gameState.currentDifficulty = diff; gameState.currentLevel = lvl;
                levelSel.classList.add('hidden'); gameScr.classList.remove('hidden');
                initGame(diff, theme);
                updateAuthorMessages();
            }

            function showWin() {
                gameScr.classList.add('hidden'); winScr.classList.remove('hidden');
                let total=0; for(let d in savedProgress) savedProgress[d].forEach(s=>total+=s);
                document.getElementById('finalStars').innerHTML = '⭐'.repeat(Math.min(total,15)) || '⭐';
                document.getElementById('congratsMessage').textContent = congrats[Math.floor(Math.random()*congrats.length)] + ' Kõik 5 taset läbitud!';
                createConfetti(canvas.width/2, canvas.height/3, 100);
                updateAuthorMessages();
            }

            function updateAuthorMessages() {
                let msg = authorMessages[Math.floor(Math.random()*authorMessages.length)];
                document.querySelectorAll('.author-credit').forEach(el=>el.textContent=msg);
                document.getElementById('greetingMessage').textContent = greetings[Math.floor(Math.random()*greetings.length)];
            }

            // ==================== SÜNDMUSED ====================
            document.querySelectorAll('.difficulty-btn').forEach(b=>b.addEventListener('click',e=>{ initAudio(); playSound('flip'); showLevelSelect(e.currentTarget.dataset.diff); }));
            themeGrid.addEventListener('click',e=>{ let b=e.target.closest('.theme-btn'); if(!b||b.classList.contains('locked')) return; initAudio(); playSound('flip'); startLevel(gameState.currentDifficulty, b.dataset.theme, parseInt(b.dataset.level)); });
            cardsCont.addEventListener('click',e=>{ let c=e.target.closest('.card'); if(c) flipCard(parseInt(c.dataset.index)); });
            hintBtn.addEventListener('click', showHint);
            document.getElementById('backToMenuBtn').addEventListener('click',()=>{ playSound('flip'); levelSel.classList.add('hidden'); menu.classList.remove('hidden'); updateAuthorMessages(); });
            document.getElementById('gameBackBtn').addEventListener('click',()=>{ playSound('flip'); gameScr.classList.add('hidden'); menu.classList.remove('hidden'); updateAuthorMessages(); });
            document.getElementById('playAgainBtn').addEventListener('click',()=>{ playSound('flip'); winScr.classList.add('hidden'); menu.classList.remove('hidden'); updateAuthorMessages(); });
            document.body.addEventListener('touchstart', ()=>initAudio(), {once:true});
            document.body.addEventListener('click', ()=>initAudio(), {once:true});

            // ==================== KÄIVITUS ====================
            loadProgress();
            updateAuthorMessages();
        })();
    </script>
</body>
</html>
