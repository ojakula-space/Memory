    <style>
        /* ==================== KRIITILINE CSS (inline, et leht laeks kiiresti) ==================== */
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
        body{min-height:100vh;background:#0a0a2a;font-family:'Segoe UI',Arial,sans-serif;display:flex;justify-content:center;align-items:center;padding:10px;touch-action:pan-x pan-y}
        .stars-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:radial-gradient(ellipse at bottom,#1b2735 0%,#090a0f 100%);overflow:hidden}
        .game-container{position:relative;z-index:10;max-width:800px;width:100%;margin:0 auto}
        .menu-screen,.game-screen,.level-select,.win-screen{background:rgba(20,30,50,0.85);backdrop-filter:blur(10px);border-radius:30px;padding:25px 20px;box-shadow:0 20px 50px rgba(0,0,0,0.5),inset 0 2px 5px rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff}
        .screen-title{text-align:center;font-size:2.5em;margin-bottom:20px;text-shadow:0 0 20px #6eb5ff,0 0 40px #4a90e2;letter-spacing:2px;font-weight:600}
        .hidden{display:none !important}
        .author-credit{margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,215,0,0.3);font-size:1.1em;color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.5);font-style:italic;text-align:center}
        #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}
        
        /* Laadimisindikaator */
        .loading-spinner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;color:#fff;font-size:2em}
        .loading-spinner.hidden{display:none}
        
        @media (max-width:600px){.screen-title{font-size:2em}}
    </style>

<body>
    <!-- ==================== TÄHISTAEVA TAUST ==================== -->
    <div class="stars-bg" role="presentation" aria-hidden="true">
        <div class="stars"></div>
    </div>
    
    <!-- ==================== KONFETI KANVAS ==================== -->
    <canvas id="confetti-canvas" role="presentation" aria-hidden="true"></canvas>
    
    <!-- ==================== LAADIMISINDIKAATOR ==================== -->
    <div id="loadingSpinner" class="loading-spinner" role="status" aria-live="polite">
        <div>🎮 Laadin mängu...</div>
    </div>

    <!-- ==================== PÕHIKONTEINER ==================== -->
    <main class="game-container" role="main">
        <!-- Peamenüü -->
        <section id="menuScreen" class="menu-screen" aria-labelledby="menuTitle">
            <h1 id="menuTitle" class="screen-title">🎮 MEMORY LANE</h1>
            <p class="subtitle greeting-message" id="greetingMessage" aria-live="polite">Alustame seiklust!</p>
            
            <div class="difficulty-grid" role="group" aria-label="Raskusastme valik">
                <button class="difficulty-btn" data-diff="easy" aria-label="Kerge raskusaste, 3 korda 4, 6 paari">
                    🌱 KERGE<br><small>3x4 (6 paari)</small>
                </button>
                <button class="difficulty-btn" data-diff="medium" aria-label="Keskmine raskusaste, 4 korda 4, 8 paari">
                    🌿 KESKMINE<br><small>4x4 (8 paari)</small>
                </button>
                <button class="difficulty-btn" data-diff="hard" aria-label="Raske raskusaste, 4 korda 5, 10 paari">
                    🔥 RASKE<br><small>4x5 (10 paari)</small>
                </button>
                <button class="difficulty-btn" data-diff="expert" aria-label="Ekspert raskusaste, 5 korda 6, 15 paari">
                    ⭐ EKSPERT<br><small>5x6 (15 paari)</small>
                </button>
            </div>
            
            <div class="game-description" style="margin:20px 0;padding:15px;background:rgba(255,255,255,0.05);border-radius:15px;text-align:center">
                <p style="margin-bottom:10px">🎯 <strong>Kuidas mängida?</strong></p>
                <p style="font-size:0.9em;opacity:0.9">Kliki kaartidel, et leida paarid. Vähem käike = rohkem tärne! ⭐⭐⭐</p>
            </div>
            
            <footer class="author-credit" role="contentinfo"></footer>
        </section>

        <!-- Taseme valik -->
        <section id="levelSelect" class="level-select hidden" aria-labelledby="difficultyTitle">
            <h2 id="difficultyTitle" class="screen-title">Vali teema</h2>
            <div id="themeGrid" class="theme-grid" role="group" aria-label="Teemade valik"></div>
            <div class="action-buttons">
                <button class="btn btn-secondary" id="backToMenuBtn" aria-label="Tagasi peamenüüsse">← Tagasi</button>
            </div>
            <footer class="author-credit" role="contentinfo"></footer>
        </section>

        <!-- Mängu ekraan -->
        <section id="gameScreen" class="game-screen hidden" aria-labelledby="gameTitle">
            <header class="game-header">
                <button class="back-btn" id="gameBackBtn" aria-label="Tagasi menüüsse">← Menüü</button>
                <div class="game-stats" role="status" aria-live="polite">
                    <span aria-label="Tärnid">⭐ <span id="starDisplay">3</span></span>
                    <span aria-label="Käigud">🔄 <span id="movesDisplay">0</span></span>
                </div>
                <button class="hint-btn" id="hintBtn" aria-label="Kasuta vihjet">
                    💡 <span id="hintsLeft">3</span>
                </button>
            </header>
            <div id="cardsContainer" class="cards-grid" role="group" aria-label="Mängukaardid"></div>
            <footer class="author-credit" role="contentinfo" style="margin-top:15px"></footer>
        </section>

        <!-- Võidu ekraan -->
        <section id="winScreen" class="win-screen hidden" aria-labelledby="winTitle">
            <h2 id="winTitle" class="screen-title">🏆 VÕIT!</h2>
            <div class="trophy" aria-hidden="true">🏆</div>
            <p class="congrats-message" id="congratsMessage" style="font-size:1.3em;margin:20px 0" aria-live="polite">
                Palju õnne! Kõik 5 taset läbitud!
            </p>
            <div id="finalStars" style="font-size:2em;margin:20px 0" aria-label="Kogutud tärnid"></div>
            <button class="btn" id="playAgainBtn" aria-label="Mängi uuesti">Mängi uuesti</button>
            <button class="btn btn-secondary" id="shareWinBtn" aria-label="Jaga võitu" style="margin-left:10px">📤 Jaga</button>
            <footer class="author-credit" role="contentinfo"></footer>
        </section>
    </main>

    <!-- ==================== JAVASCRIPT ==================== -->
    <script src="/Memory/assets/js/game.min.js" defer></script>
    
    <!-- ==================== SERVICE WORKER REGISTREERIMINE ==================== -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/Memory/service-worker.js')
                    .then(reg => console.log('✅ Service Worker registreeritud:', reg.scope))
                    .catch(err => console.log('❌ Service Worker viga:', err));
            });
        }
        
        // Peida laadimisindikaator
        window.addEventListener('load', () => {
            document.getElementById('loadingSpinner').classList.add('hidden');
        });
    </script>
